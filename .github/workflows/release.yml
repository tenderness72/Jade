name: Release

on:
  push:
    tags:
      - "v*"          # v0.1.0 などタグをプッシュするとリリースビルド開始
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write   # リリース作成に必要

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          # ── Linux (AppImage + deb) ────────────────────────────────
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb

    runs-on: ${{ matrix.os }}

    steps:
      # ── ソース取得 ────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust ─────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux 依存パッケージ ──────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev

      # ── npm install ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Tauri ビルド ──────────────────────────────────────────────
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Jade ${{ github.ref_name }}"
          releaseBody: |
            ## ダウンロード
            | OS | ファイル |
            |---|---|
            | Windows | `Jade_x.x.x_x64_en-US.msi` または `Jade_x.x.x_x64-setup.exe` |
            | Linux | `jade_x.x.x_amd64.AppImage` または `jade_x.x.x_amd64.deb` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
